<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- PWA Settings -->
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjogImJhYmEgcGRmIG9yZ2FuaXplciIsICJzaG9ydF9uYW1lIjogIkJhYmEgUERGIiwgImRlc2NyaXB0aW9uIjogIk1vYmlsZS1mcmllbmRseSBpbnRlcmFjdGl2ZSB0b29sIHRvIHJlb3JnYW5pemUgUERGLiIsICJzdGFydF91cmwiOiAiLi9pbmRleC5odG1sIiwgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsICJiYWNrZ3JvdW5kX2NvbG9yIjogIiNmOWZhZmIiLCAidGhlbWVfY29sb3IiOiAiIzRmNDZlNSIsICJpY29ucyI6IFt7ICJzcmMiOiAiZGF0YTppbWFnZS9zdmcreG1sO3V0ZjgsPHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCA1MTIgNTEyJz48cmVjdCB3aWR0aD0nNTEyJyBoZWlnaHQ9JzUxMicgcng9JzEyOCcgZmlsbD0nJTIzNGY0NmU1Jy8+PHBhdGggZD0nTTE3MCAxNDBoMTcydjIzMkgxNzB6JyBmaWxsPSdub25lJyBzdHJva2U9JyUyM2ZmZmZmZicgc3Ryb2tlLXdpZHRoPScyMCcvPjxwYXRoIGQ9J00yMTAgMTkwaDkyTTIxMCAyNTZoOTJNMjEwIDMyMmg1MCcgc3Ryb2tlPSclMjNmZmZmZmYnIHN0cm9rZS13aWR0aD0nMjAnIHN0cm9rZS1saW5lY2FwPSdyb3VuZCcvPjwvc3ZnPiIsICJzaXplcyI6ICJhbnkiLCAidHlwZSI6ICJpbWFnZS9zdmcreG1sIiwgInB1cnBvc2UiOiAiYW55IG1hc2thYmxlIiB9XSB9">

    <meta name="theme-color" content="#4f46e5">
    <!-- Tailwind CSS for modern mobile UI (Play CDN - convenient for single-file prototyping) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js for rendering PDF pages onto canvases -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="preload" as="worker" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js">
    <!-- pdf-lib to construct and merge PDF files in-browser -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- SortableJS for flawless mobile-responsive drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <style>
        /* Disable automatic double-tap zoom behavior on modern mobile browsers for instant feedback */
        button, .page-card, .drag-handle {
            touch-action: manipulation;
        }

        /* Support retina displays nicely */
        canvas {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* Prevent system dragging overlays during item reordering */
        .opacity-30 {
            opacity: 0.25 !important;
            border-style: dashed !important;
            border-color: #4f46e5 !important; /* indigo-600 */
        }

        /* Mobile Safe-Area padding adjustments for notched phones */
        .safe-pb {
            padding-bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px));
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col antialiased select-none">

    <!-- App Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="p-2 bg-indigo-50 rounded-lg text-indigo-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
                </svg>
            </div>
            <h1 class="text-base font-bold text-gray-800 tracking-tight">baba pdf organizer</h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="installBtn" class="hidden text-xs font-semibold bg-indigo-600 text-white px-2.5 py-1 rounded-full active:scale-95 hover:bg-indigo-700 transition-all">Install App</button>
            <div class="text-xs font-semibold bg-indigo-50 text-indigo-700 px-2.5 py-1 rounded-full">(works offline)</div>
        </div>
    </header>

    <!-- Main Content Panel -->
    <main class="flex-1 flex flex-col max-w-lg mx-auto w-full p-4 pb-28">
        
        <!-- Upload dropzone & file picker -->
        <div id="dropzone" class="flex-1 flex flex-col items-center justify-center min-h-[50vh]">
            <label for="fileInput" class="flex flex-col items-center justify-center w-full py-16 px-6 cursor-pointer rounded-2xl border-2 border-dashed border-gray-300 bg-white hover:bg-gray-50/50 hover:border-indigo-500 active:scale-[0.98] transition-all duration-200 shadow-sm">
                <div class="p-4 bg-indigo-50 text-indigo-600 rounded-full mb-4">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
                    </svg>
                </div>
                <span class="text-base font-bold text-gray-800 text-center">Tap to Choose PDF</span>
                <span class="text-xs text-gray-400 mt-1 text-center">Processes completely on your device</span>
                <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            </label>
        </div>

        <!-- Editor Workspace (Hidden till Loaded) -->
        <div id="workspace" class="hidden flex-1 flex flex-col gap-4">
            
            <!-- Instructions and Load New Trigger -->
            <div class="flex flex-col gap-3 bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <div class="flex items-start justify-between">
                    <div>
                        <h2 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Instructions</h2>
                        <p class="text-xs text-gray-600 mt-0.5">💡 Tap pages to select/deselect.<br>Drag <span class="font-bold text-indigo-600">☰</span> to change order.</p>
                    </div>
                </div>
                <!-- Action Controls (Select All / Reset) -->
                <div class="flex items-center gap-2 border-t border-gray-100 pt-3">
                    <button id="selectAllBtn" onclick="toggleSelectAll()" class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 text-xs font-bold text-indigo-600 bg-indigo-50 active:bg-indigo-100 active:scale-95 rounded-lg transition-all">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Select All
                    </button>
                    <button onclick="resetApp()" class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2.5 text-xs font-bold text-gray-600 bg-gray-100 active:bg-gray-200 active:scale-95 rounded-lg transition-all">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                        </svg>
                        Reset
                    </button>
                </div>
            </div>

            <!-- Drag and Drop Page Grid -->
            <div id="grid" class="grid grid-cols-2 gap-3 mt-1">
                <!-- Page Cards rendered dynamically -->
            </div>

        </div>

    </main>

    <!-- Sticky Bottom Bar -->
    <div id="bottomBar" class="hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-200/80 shadow-[0_-8px_30px_rgb(0,0,0,0.06)] z-30">
        <div class="max-w-lg mx-auto px-4 pt-3 pb-3 safe-pb flex items-center justify-between gap-4">
            <div>
                <p class="text-[10px] uppercase tracking-wider font-extrabold text-gray-400">Selected</p>
                <p id="selectionCountText" class="text-sm font-bold text-gray-800">0 of 0 selected</p>
            </div>
            <button id="exportBtn" onclick="exportReorganizedPDF()" class="flex-1 flex items-center justify-center gap-2 bg-indigo-600 active:bg-indigo-700 active:scale-[0.98] text-white py-3.5 px-5 rounded-xl font-bold text-sm shadow-md shadow-indigo-600/10 transition-all">
                <span>Export PDF</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Processing Full Screen Modal -->
    <div id="loadingOverlay" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm transition-all duration-300">
        <div class="relative flex items-center justify-center">
            <div class="absolute w-16 h-16 rounded-full border-4 border-indigo-100 animate-pulse"></div>
            <div class="w-12 h-12 rounded-full border-4 border-indigo-600 border-t-transparent animate-spin"></div>
        </div>
        <p id="loadingText" class="mt-6 text-sm font-bold text-gray-700 text-center px-6 leading-relaxed max-w-xs">
            Processing document...
        </p>
    </div>

    <!-- Engine JS Scripting Block -->
    <script>
        // Store binary and document states
        let originalArrayBuffer = null;
        let pdfDocInstance = null;

        // UI Selectors
        const fileInput = document.getElementById('fileInput');
        const dropzone = document.getElementById('dropzone');
        const workspace = document.getElementById('workspace');
        const grid = document.getElementById('grid');
        const bottomBar = document.getElementById('bottomBar');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const exportBtn = document.getElementById('exportBtn');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const selectionCountText = document.getElementById('selectionCountText');

        // Core PDF.js initialization
        const pdfjsLib = window['pdfjs-dist/build/pdf'] || window.pdfjsLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Initialize SortableJS for interactive dragging using only handles to keep scrolling smooth
        const sortable = new Sortable(grid, {
            handle: '.drag-handle',
            animation: 200,
            ghostClass: 'opacity-30',
            onEnd: function() {
                updatePageNumbers();
                updateSelectionStats();
            }
        });

        // Trigger Loading Modal Utility
        function showLoading(msg) {
            loadingText.textContent = msg;
            loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        // File Selection listeners
        fileInput.addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });

        // Drag/Drop Listeners
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-indigo-500', 'bg-indigo-50/30');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-indigo-500', 'bg-indigo-50/30');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-indigo-500', 'bg-indigo-50/30');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            if (file.type !== "application/pdf") {
                alert("Please upload a valid PDF document.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                loadPDF(e.target.result);
            };
            reader.readAsArrayBuffer(file);
        }

        // Parse and render PDF
        async function loadPDF(arrayBuffer) {
            showLoading("Parsing PDF document...");
            originalArrayBuffer = arrayBuffer;
            grid.innerHTML = '';

            try {
                // Slicing the ArrayBuffer creates a copy. This is critical because PDF.js transfers (detaches)
                // the buffer to its web worker, which would otherwise leave the main thread's originalArrayBuffer empty.
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer.slice(0) });
                pdfDocInstance = await loadingTask.promise;
                const totalPages = pdfDocInstance.numPages;

                for (let i = 1; i <= totalPages; i++) {
                    showLoading(`Generating thumbnail ${i} of ${totalPages}...`);
                    const page = await pdfDocInstance.getPage(i);

                    // Create responsive Card Grid layout
                    const card = document.createElement('div');
                    card.className = 'page-card relative bg-white border-2 border-indigo-600 ring-2 ring-indigo-600/5 rounded-xl overflow-hidden shadow-sm transition-all duration-200 active:scale-[0.98] select-none';
                    card.setAttribute('data-original-index', i - 1);
                    card.setAttribute('data-selected', 'true');

                    card.innerHTML = `
                        <!-- selection state marker -->
                        <div class="absolute top-2 left-2 z-10 flex items-center justify-center w-6 h-6 rounded-full bg-indigo-600 text-white shadow-sm border border-white selection-badge transition-all">
                            <svg class="w-3.5 h-3.5 check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>

                        <!-- large touch hit target drag handle -->
                        <div class="absolute top-1.5 right-1.5 z-10 flex items-center justify-center w-10 h-10 rounded-full bg-white/90 backdrop-blur-sm text-gray-500 shadow-sm border border-gray-100 active:bg-gray-100 active:scale-95 drag-handle cursor-grab transition-all">
                            <svg class="w-5 h-5 pointer-events-none" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M7 2a2 2 0 11.001 3.999A2 2 0 017 2zm0 6a2 2 0 11.001 3.999A2 2 0 017 8zm0 6a2 2 0 11.001 3.999A2 2 0 017 14zm6-12a2 2 0 11.001 3.999A2 2 0 0113 2zm0 6a2 2 0 11.001 3.999A2 2 0 0113 8zm0 6a2 2 0 11.001 3.999A2 2 0 0113 14z"></path>
                            </svg>
                        </div>

                        <div class="aspect-[3/4] bg-gray-100 flex items-center justify-center overflow-hidden relative">
                            <canvas class="w-full h-full object-contain pointer-events-none"></canvas>
                        </div>

                        <!-- Info Footer (Holds dynamic index and absolute original page index) -->
                        <div class="py-2.5 text-center bg-gray-50 border-t border-gray-100">
                            <div class="text-xs font-extrabold text-gray-800">
                                Page <span class="current-num">${i}</span>
                            </div>
                            <div class="text-[10px] text-gray-400 font-bold tracking-wider uppercase mt-0.5">
                                Original Page: ${i}
                            </div>
                        </div>
                    `;

                    // Render standard low-res layout to protect mobile graphics memory limits
                    const canvas = card.querySelector('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 0.35 });

                    const dpr = window.devicePixelRatio || 1;
                    canvas.width = viewport.width * dpr;
                    canvas.height = viewport.height * dpr;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport,
                        transform: dpr !== 1 ? [dpr, 0, 0, dpr, 0, 0] : null
                    };

                    await page.render(renderContext).promise;

                    // Tap listener logic (filtering out the drag action handles)
                    card.addEventListener('click', (e) => {
                        if (e.target.closest('.drag-handle')) return;
                        toggleSelection(card);
                    });

                    grid.appendChild(card);
                }

                // Show workspace and update calculations
                dropzone.classList.add('hidden');
                workspace.classList.remove('hidden');
                bottomBar.classList.remove('hidden');
                updatePageNumbers();
                updateSelectionStats();
                hideLoading();

            } catch (err) {
                console.error(err);
                alert("Could not process PDF. Ensure it is unencrypted.");
                hideLoading();
            }
        }

        // Keep page sequential indexing numbers correct after drag events
        function updatePageNumbers() {
            const cards = document.querySelectorAll('.page-card');
            cards.forEach((card, index) => {
                const numSpan = card.querySelector('.current-num');
                if (numSpan) {
                    numSpan.textContent = index + 1;
                }
            });
        }

        // Toggles selection state visually and logically
        function toggleSelection(card) {
            const isSelected = card.getAttribute('data-selected') === 'true';
            setCardSelectionState(card, !isSelected);
            updateSelectionStats();
        }

        // Explicit card styling update
        function setCardSelectionState(card, selectState) {
            card.setAttribute('data-selected', selectState ? 'true' : 'false');

            const badge = card.querySelector('.selection-badge');
            const checkIcon = card.querySelector('.check-icon');

            if (selectState) {
                card.classList.remove('border-gray-200', 'opacity-40');
                card.classList.add('border-indigo-600', 'ring-2', 'ring-indigo-600/5');
                badge.classList.remove('bg-gray-100', 'border-gray-200');
                badge.classList.add('bg-indigo-600', 'border-white');
                checkIcon.classList.remove('hidden');
            } else {
                card.classList.remove('border-indigo-600', 'ring-2', 'ring-indigo-600/5');
                card.classList.add('border-gray-200', 'opacity-40');
                badge.classList.remove('bg-indigo-600', 'border-white');
                badge.classList.add('bg-gray-100', 'border-gray-200');
                checkIcon.classList.add('hidden');
            }
        }

        // Smart Select All / Deselect All logic
        function toggleSelectAll() {
            const cards = document.querySelectorAll('.page-card');
            if (cards.length === 0) return;

            // Check if all pages are already selected
            const allSelected = Array.from(cards).every(card => card.getAttribute('data-selected') === 'true');

            // If all selected, deselect them all. Otherwise, select everything.
            cards.forEach(card => {
                setCardSelectionState(card, !allSelected);
            });

            updateSelectionStats();
        }

        // Calculates live page parameters and updates UI action triggers
        function updateSelectionStats() {
            const cards = document.querySelectorAll('.page-card');
            let selectedCount = 0;
            
            cards.forEach(card => {
                if (card.getAttribute('data-selected') === 'true') {
                    selectedCount++;
                }
            });

            // Update footer tally text
            selectionCountText.textContent = `${selectedCount} of ${cards.length} selected`;

            // Adjust Select All toggle text dynamically based on selection state
            if (cards.length > 0) {
                if (selectedCount === cards.length) {
                    selectAllBtn.innerHTML = `
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Deselect All
                    `;
                } else {
                    selectAllBtn.innerHTML = `
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        Select All
                    `;
                }
            }

            if (selectedCount === 0) {
                exportBtn.disabled = true;
                exportBtn.classList.add('opacity-40', 'cursor-not-allowed');
            } else {
                exportBtn.disabled = false;
                exportBtn.classList.remove('opacity-40', 'cursor-not-allowed');
            }
        }

        // Reorder, merge, and export the file
        async function exportReorganizedPDF() {
            showLoading("Exporting document assembly...");

            try {
                // Initialize clean target model using the preserved originalArrayBuffer
                const srcDoc = await PDFLib.PDFDocument.load(originalArrayBuffer);
                const dstDoc = await PDFLib.PDFDocument.create();

                const cards = document.querySelectorAll('.page-card');
                const copyOrder = [];

                cards.forEach(card => {
                    if (card.getAttribute('data-selected') === 'true') {
                        const idx = parseInt(card.getAttribute('data-original-index'), 10);
                        copyOrder.push(idx);
                    }
                });

                if (copyOrder.length === 0) {
                    alert("Please select at least one page.");
                    hideLoading();
                    return;
                }

                showLoading(`Copying ${copyOrder.length} pages...`);
                const pages = await dstDoc.copyPages(srcDoc, copyOrder);
                pages.forEach(page => dstDoc.addPage(page));

                showLoading("Packaging document data...");
                const compiledBytes = await dstDoc.save();

                // Save file programmatically
                const fileBlob = new Blob([compiledBytes], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(fileBlob);

                const downloadLink = document.createElement('a');
                downloadLink.href = blobUrl;
                downloadLink.download = 'reorganized_document.pdf';
                
                showLoading("Downloading document...");
                downloadLink.click();

                setTimeout(() => {
                    URL.revokeObjectURL(blobUrl);
                    hideLoading();
                }, 1200);

            } catch (err) {
                console.error(err);
                alert("An error occurred during assembly processing. Check PDF restrictions.");
                hideLoading();
            }
        }

        // Reset application to input state
        function resetApp() {
            if (confirm("Reset current changes and upload a new PDF?")) {
                originalArrayBuffer = null;
                pdfDocInstance = null;
                fileInput.value = '';
                workspace.classList.add('hidden');
                bottomBar.classList.add('hidden');
                dropzone.classList.remove('hidden');
            }
        }

        // Register Service Worker for offline PWA support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }

        // PWA Installation helper
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`PWA install choice: ${outcome}`);
            deferredPrompt = null;
            installBtn.classList.add('hidden');
        });

        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            installBtn.classList.add('hidden');
            console.log('PWA installed');
        });
    </script>
</body>
</html>
